spring.application.name=tpip_backend
server.port=8080

# ================= DATABASE configuration=================
spring.datasource.url=jdbc:postgresql://localhost:5432/tpip_database
spring.datasource.username=rahma
spring.datasource.password=12345

spring.datasource.driver-class-name=org.postgresql.Driver

